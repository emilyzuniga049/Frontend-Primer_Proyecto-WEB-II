<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TicoAutos | Mis Vehículos</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/myVehicles.css" />
</head>
<body class="bg-black text-white min-h-screen">

  <header class="sticky top-0 z-50 border-b border-zinc-800 bg-black/85 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-4 flex-wrap">
      <div class="flex items-center gap-3">
        <img src="../img/ticoautos-logo.png" alt="Logo TicoAutos" class="w-28 h-auto" />
        <div>
          <h1 class="text-2xl md:text-3xl font-bold tracking-wide">
            <span class="text-red-500">Mis</span> Vehículos
          </h1>
          <p class="text-sm text-zinc-400">Administra los vehículos publicados por tu cuenta</p>
        </div>
      </div>

      <div class="flex items-center gap-3 flex-wrap">
        <a href="./index.html"
          class="px-4 py-2 rounded-xl bg-zinc-800 hover:bg-zinc-700 transition font-semibold">
          Inicio
        </a>

        <a href="./publishVehicle.html"
          class="px-4 py-2 rounded-xl bg-red-600 hover:bg-red-500 transition font-semibold">
          Publicar vehículo
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <section class="mb-8">
      <div class="page-box fade-up p-6">
        <h2 class="text-2xl font-bold text-white">Tus publicaciones</h2>
        <p class="text-zinc-400 mt-2">
          Aquí puedes ver, editar, eliminar o marcar como vendido tus vehículos.
        </p>
      </div>
    </section>

    <section id="myVehiclesContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></section>
  </main>

  <script src="../JS/API/myVehicles.js"></script>
  <script src="../JS/myVehicles.js"></script>
</body>
</html>
