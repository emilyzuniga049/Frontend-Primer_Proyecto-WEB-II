<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TicoAutos | Detalle del Vehículo</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/vehicleDetails.css" />
</head>
<body class="bg-black text-white min-h-screen">

  <header class="sticky top-0 z-50 border-b border-zinc-800 bg-black/85 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-4 flex-wrap">
      <div class="flex items-center gap-3">
        <img src="../img/ticoautos-logo.png" alt="Logo TicoAutos" class="w-28 h-auto" />
        <div>
          <h1 class="text-2xl md:text-3xl font-bold tracking-wide">
            <span class="text-red-500">Detalle</span> del Vehículo
          </h1>
          <p class="text-sm text-zinc-400">Información completa del vehículo</p>
        </div>
      </div>

      <a href="./searchVehicles.html"
        class="px-4 py-2 rounded-xl bg-zinc-800 hover:bg-zinc-700 transition font-semibold">
        Volver
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <section id="vehicleDetailsContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></section>
    
    <section class="mt-10">
      <div class="detail-card p-6 lg:p-8">
        <h3 class="text-2xl font-bold text-white mb-4">Preguntas y respuestas</h3>

        <!-- Form pregunta -->
        <div id="questionFormContainer" class="mb-6 hidden">
          <textarea id="questionInput"
            class="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-3 text-white"
            placeholder="Escribe tu pregunta..."></textarea>

          <button id="sendQuestionBtn"
            class="mt-3 px-4 py-2 bg-red-600 hover:bg-red-500 rounded-xl font-semibold">
            Enviar pregunta
          </button>
        </div>

        <!-- Lista -->
        <div id="questionsContainer" class="flex flex-col gap-4"></div>

        <p id="questionMessage" class="text-sm text-zinc-400 mt-4"></p>
      </div>
    </section>
  </main>

  <script src="../JS/API/vehicleDetails.js"></script>
  <script src="../JS/vehicleDetails.js"></script>
  <script src="../JS/API/questionAnswer.js"></script>
</body>
</html>
